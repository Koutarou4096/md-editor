<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MARKDOWN EDITOR</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;800&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #e9e9e9;
    --paper-line: #959595;
    --ink: #000000;
    --ink-soft: #5B6670;
    --hanko: #B23A2E;
    --hanko-dark: #8C2C22;
    --preview-bg: #FFFFFF;
    --gutter: #EFE9DA;
    --shadow: rgba(35,48,58,0.08);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;
    background:var(--paper);
    color:var(--ink);
    font-family:'Noto Sans JP',sans-serif;
    overflow:hidden;
  }
  .app{
    display:flex;
    flex-direction:column;
    height:100vh;
  }
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 24px;
    border-bottom:1px solid var(--paper-line);
    background:var(--paper);
    flex-shrink:0;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:12px;
  }
  .hanko-mark{
    width:34px;height:34px;
    border-radius:50%;
    border:2px solid var(--hanko);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Shippori Mincho',serif;
    font-weight:800;
    color:var(--hanko);
    font-size:12px;
    letter-spacing:-.02em;
    flex-shrink:0;
    transition:transform .25s ease;
  }
  .hanko-mark.saved{
    animation:stamp .35s ease;
  }
  @keyframes stamp{
    0%{transform:scale(1.6);opacity:0;}
    60%{transform:scale(0.92);opacity:1;}
    100%{transform:scale(1);}
  }
  .brand-text h1{
    font-family:'Shippori Mincho',serif;
    font-size:18px;
    font-weight:600;
    margin:0;
    letter-spacing:.03em;
  }
  .brand-text p{
    margin:0;
    font-size:11px;
    color:var(--ink-soft);
    letter-spacing:.08em;
  }
  .toolbar{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .status{
    font-size:12.5px;
    color:var(--ink-soft);
    font-family:'JetBrains Mono',monospace;
    min-width:120px;
    text-align:right;
  }
  button{
    font-family:'Noto Sans JP',sans-serif;
    font-size:12.5px;
    font-weight: 500;
    border:1px solid var(--paper-line);
    background:var(--paper);
    color:var(--ink);
    padding:8px 14px;
    border-radius:3px;
    cursor:pointer;
    transition:border-color .15s ease, color .15s ease;
  }
  button:hover{
    border-color:var(--hanko);
    color:var(--hanko-dark);
  }
  button:focus-visible, textarea:focus-visible{
    outline:2px solid var(--hanko);
    outline-offset:1px;
  }
  button.primary{
    background:var(--hanko);
    border-color:var(--hanko);
    color:#fff;
  }
  button.primary:hover{
    background:var(--hanko-dark);
    border-color:var(--hanko-dark);
    color:#fff;
  }

  .panes{
    flex:1;
    display:flex;
    min-height:0;
  }
  .pane{
    flex:1;
    min-width:0;
    display:flex;
    flex-direction:column;
  }
  .pane-label{
    font-family:'Noto Sans JP',sans-serif;
    font-size:12.5px;
    font-weight: 700;
    letter-spacing:.12em;
    color:var(--ink-soft);
    padding:8px 20px;
    border-bottom:1px solid var(--paper-line);
    flex-shrink:0;
    text-transform:uppercase;
  }
  #editorPane{
    background:
      linear-gradient(var(--paper) 0, var(--paper) 100%),
      repeating-linear-gradient(
        to bottom,
        transparent 0,
        transparent 27px,
        var(--paper-line) 27px,
        var(--paper-line) 28px
      );
    border-right:1px solid var(--paper-line);
  }
  textarea{
    flex:1;
    width:100%;
    resize:none;
    border:none;
    outline:none;
    background:transparent;
    font-family:'JetBrains Mono',monospace;
    font-size:14px;
    line-height:28px;
    color:var(--ink);
    padding:12px 24px 40px 24px;
    caret-color:var(--hanko);
  }
  textarea::placeholder{
    color:#B9B0A0;
  }

  .divider{
    width:1px;
    background:var(--paper-line);
    flex-shrink:0;
    cursor:col-resize;
    position:relative;
  }
  .divider:hover{ background:var(--hanko); }
  .divider::after{
    content:'';
    position:absolute;
    top:0;left:-4px;right:-4px;bottom:0;
  }

  #previewPane{
    background:var(--preview-bg);
  }
  #preview{
    flex:1;
    overflow-y:auto;
    padding:20px 32px 60px 32px;
    font-family:'Noto Sans JP',sans-serif;
    font-size:15px;
    line-height:1.85;
    color:var(--ink);
  }
  #preview h1,#preview h2,#preview h3,#preview h4{
    font-family:'Noto Sans JP',sans-serif;
    font-weight:600;
    color:var(--ink);
    line-height:1.4;
  }
  #preview h1{
    font-size:28px;
    border-bottom:2px solid var(--ink);
    padding-bottom:10px;
    margin:8px 0 20px;
  }
  #preview h2{
    font-size:21px;
    margin:32px 0 14px;
    border-left:4px solid var(--ink);
    padding-left:10px;
  }
  #preview h3{ font-size:17px; margin:24px 0 10px; }
  #preview p{ margin:0 0 16px; }
  #preview a{ color:var(--ink); text-decoration:underline; }
  #preview code{
    font-family:'JetBrains Mono',monospace;
    background:#EEEEEE;
    padding:2px 6px;
    border-radius:3px;
    font-size:13px;
  }
  #preview pre{
    background:var(--ink);
    color:#F3EFE4;
    padding:16px 18px;
    border-radius:5px;
    overflow-x:auto;
    margin:0 0 18px;
  }
  #preview pre code{
    background:none;
    padding:0;
    color:inherit;
  }
  #preview blockquote{
    margin:0 0 18px;
    padding:4px 18px;
    border-left:3px solid #BBBBBB;
    color:var(--ink-soft);
  }
  #preview ul,#preview ol{ margin:0 0 16px; padding-left:24px; }
  #preview li{ margin-bottom:6px; }
  #preview table{
    border-collapse:collapse;
    width:100%;
    margin:0 0 18px;
    font-size:14px;
  }
  #preview th,#preview td{
    border:1px solid #999999;
    padding:8px 12px;
    text-align:left;
  }
  #preview th{
    background:#EEEEEE;
    font-weight:600;
  }
  #preview img{ max-width:100%; border-radius:4px; filter:grayscale(100%); }
  #preview hr{
    border:none;
    border-top:1px solid #BBBBBB;
    margin:28px 0;
  }
  #preview:empty::before{
    content:'ここにプレビューが表示されます';
    color:#B9B0A0;
  }

  @media (max-width: 760px){
    .panes{ flex-direction:column; }
    .divider{ display:none; }
    #editorPane{ border-right:none; border-bottom:1px solid var(--paper-line); }
    .brand-text p{ display:none; }
    .status{ display:none; }
  }

  @media (prefers-reduced-motion: reduce){
    .hanko-mark.saved{ animation:none; }
  }

  @media print{
    body{ overflow:visible; }
    header, .pane-label, .divider, #editorPane{ display:none !important; }
    .app, .panes{ height:auto; display:block; }
    #previewPane{ display:block; }
    #preview{
      overflow:visible;
      padding:0;
      font-size:12.5pt;
      line-height:1.7;
    }
    #preview pre{
      white-space:pre-wrap;
      word-break:break-word;
    }
    #preview h1, #preview h2, #preview h3{
      break-after:avoid;
    }
    #preview img, #preview table, #preview pre, #preview blockquote{
      break-inside:avoid;
    }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <div class="hanko-mark" id="hankoMark">MD</div>
      <div class="brand-text">
        <h1>MARKDOWN EDITOR</h1>
        <p>©Kasuga Kosuke made with Claude</p>
      </div>
    </div>
    <div class="toolbar">
      <span class="status" id="statusText">0 文字</span>
      <button onclick="location.href='https://github.com/Koutarou4096/md-editor'">GitHubリポジトリ</button>
      <button id="downloadMdBtn">.md を保存</button>
      <button id="downloadHtmlBtn">HTML を保存</button>
      <button id="printBtn">印刷 / PDF保存</button>
      <button class="primary" id="clearBtn">クリア</button>
    </div>
  </header>

  <div class="panes">
    <div class="pane" id="editorPane">
      <div class="pane-label">EDITOR</div>
      <textarea id="editor" spellcheck="false" placeholder="ここにMarkdownを入力してください…

# 見出し
本文を書きます。

- リスト項目1
- リスト項目2

```コード``` や **太字** も使えます。"></textarea>
    </div>
    <div class="divider" id="divider"></div>
    <div class="pane" id="previewPane">
      <div class="pane-label">PREVIEW</div>
      <div id="preview"></div>
    </div>
  </div>
</div>

<script>
  const editor = document.getElementById('editor');
  const preview = document.getElementById('preview');
  const statusText = document.getElementById('statusText');
  const hankoMark = document.getElementById('hankoMark');
  const divider = document.getElementById('divider');
  const panes = document.querySelector('.panes');
  const editorPane = document.getElementById('editorPane');

  marked.setOptions({ breaks: true, gfm: true });

  const STORAGE_KEY = 'markdown-editor-autosave';
  const SAMPLE = "# ようこそ\n\n左側に **Markdown** を入力すると、右側にリアルタイムでプレビューが表示されます。\n\n## 使い方\n\n1. 左のエリアに文章を書く\n2. 右側でそのまま確認できる\n3. 完成したら「.md を保存」または「HTML を保存」\n\n> コードブロックや表、リンクにも対応しています。\n\n```js\nconsole.log('Hello, Markdown!');\n```\n\n| 項目 | 対応 |\n| --- | --- |\n| 見出し | ○ |\n| リスト | ○ |\n| 表 | ○ |\n";

  let saveTimer = null;
  function scheduleAutosave(){
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      try{
        localStorage.setItem(STORAGE_KEY, editor.value);
      }catch(e){
        // localStorageが使えない環境（プライベートモード等）では無視
      }
    }, 400);
  }

  function render(){
    const text = editor.value;
    preview.innerHTML = marked.parse(text);
    statusText.textContent = text.length.toLocaleString('ja-JP') + ' 文字';
  }

  editor.addEventListener('input', () => {
    render();
    scheduleAutosave();
  });

  let restored = false;
  try{
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved !== null && saved !== ''){
      editor.value = saved;
      restored = true;
    }
  }catch(e){
    // localStorageが使えない環境では無視
  }
  if (!restored){
    editor.value = SAMPLE;
  }
  render();

  //再読み込みなどで開きなおした際にキャッシュから呼び出す
  if (restored){
    const original = statusText.textContent;
    statusText.textContent = '前回の内容を復元しました';
    setTimeout(() => { statusText.textContent = original; }, 5000);
  }

  function stampSave(){
    hankoMark.classList.remove('saved');
    void hankoMark.offsetWidth;
    hankoMark.classList.add('saved');
  }

  function downloadFile(filename, content, mime){
    const blob = new Blob([content], { type: mime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    stampSave();
  }

  document.getElementById('downloadMdBtn').addEventListener('click', () => {
    downloadFile('document.md', editor.value, 'text/markdown;charset=utf-8');
  });

  document.getElementById('downloadHtmlBtn').addEventListener('click', () => {
    const html = '<!DOCTYPE html>\n<html lang="ja"><head><meta charset="UTF-8"><title>document</title></head><body>\n' + marked.parse(editor.value) + '\n</body></html>';
    downloadFile('document.html', html, 'text/html;charset=utf-8');
  });

  document.getElementById('printBtn').addEventListener('click', () => {
    window.print();
  });

  document.getElementById('clearBtn').addEventListener('click', () => {
    if (editor.value.trim() === '' || confirm('入力内容をすべて消去しますか？（自動保存のキャッシュも削除されます）')) {
      editor.value = '';
      render();
      try{ localStorage.removeItem(STORAGE_KEY); }catch(e){}
      editor.focus();
    }
  });

  // Resizable divider
  let dragging = false;
  divider.addEventListener('mousedown', () => {
    dragging = true;
    document.body.style.cursor = 'col-resize';
  });
  window.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const rect = panes.getBoundingClientRect();
    let ratio = (e.clientX - rect.left) / rect.width;
    ratio = Math.min(0.8, Math.max(0.2, ratio));
    editorPane.style.flex = ratio + ' 1 0';
  });
  window.addEventListener('mouseup', () => {
    dragging = false;
    document.body.style.cursor = '';
  });

  // Tab key inserts spaces in editor
  editor.addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const start = editor.selectionStart;
      const end = editor.selectionEnd;
      editor.value = editor.value.slice(0, start) + '  ' + editor.value.slice(end);
      editor.selectionStart = editor.selectionEnd = start + 2;
      render();
    }
  });
</script>
</body>
</html>
